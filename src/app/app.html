<!-- Spinner Start -->
<div id="spinner" class="bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-grow text-primary" role="status"></div>
</div>
<!-- Spinner End -->

<app-header></app-header>

<router-outlet></router-outlet>

<app-footer></app-footer>

<!-- Back to Top -->
<a href="#" class="btn btn-lg btn-primary btn-lg-square rounded-circle back-to-top">
    <i class="bi bi-arrow-up"></i>
</a>

<!-- Floating Call Button -->
<a href="tel:+971562475707" class="btn btn-lg btn-primary btn-lg-square rounded-circle floating-call animate-pulse" aria-label="Call Support">
    <i class="fa fa-phone-alt animate-shake"></i>
</a>

<!-- Floating WhatsApp Button & Widget Container -->
<div class="floating-whatsapp-container">
    <!-- Interactive Tooltip -->
    <div class="whatsapp-tooltip shadow-sm">
        <span class="tooltip-dot"></span>
        Need help? Chat with us!
    </div>
    
    <!-- Notification Badge -->
    <span class="whatsapp-badge">1</span>
    
    <!-- Floating Circular Button -->
    <button class="btn btn-lg btn-success btn-lg-square rounded-circle floating-whatsapp" (click)="toggleChat()" aria-label="WhatsApp Support">
        <i class="fab fa-whatsapp text-white" style="font-size: 1.7rem;"></i>
    </button>
</div>

<!-- WhatsApp Chat Popup (Joinchat Inspired) -->
@if (isChatOpen()) {
<div class="whatsapp-popup-window shadow-lg">
    <!-- Premium Header with Brand Gradients -->
    <div class="whatsapp-popup-header d-flex align-items-center justify-content-between p-2">
        <div class="d-flex align-items-center">
            <div class="whatsapp-avatar position-relative me-3">
                <div class="avatar-icon d-flex align-items-center justify-content-center text-white rounded-circle shadow-sm" style="width: 46px; height: 46px; font-weight: 600; font-size: 1.2rem; border: 2px solid rgba(255, 255, 255, 0.4); background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);">
                    <img ngSrc="img/icon/logo.webp" alt="Al Sahel Repair Logo" fill style="object-fit: cover;" />
                </div>
                <!-- Status Badge -->
                <span class="status-badge position-absolute bottom-0 end-0 rounded-circle bg-success shadow-sm" style="width: 13px; height: 13px; border: 2.5px solid var(--dark-navy);"></span>
            </div>
            <div class="mt-1">
                <h6 class="text-white mb-0" style="font-size: 1.05rem; font-weight: 600; font-family: 'Poppins', sans-serif; letter-spacing: 0.3px;">Al Sahel Repair</h6>
                <small class="text-white-50 d-flex align-items-center gap-1.5" style="font-size: 0.75rem;">
                    <span class="status-dot-pulse me-1"></span>
                    Online | Replies in minutes
                </small>
            </div>
        </div>
        <button class="whatsapp-close-btn d-flex align-items-center justify-content-center rounded-circle border-0 text-white" (click)="closeChat()" aria-label="Close Chat">
            <i class="bi bi-x" style="font-size: 1.6rem; line-height: 1;"></i>
        </button>
    </div>
    
    <!-- Chat Body with WhatsApp Pattern Background -->
    <div class="whatsapp-popup-body p-3">
        <div class="whatsapp-chat-bubble position-relative p-3 shadow-sm">
            <p class="mb-1 text-dark" style="font-size: 0.88rem; font-family: 'Inter', sans-serif; line-height: 1.55;">
                Hello there! 👋 Welcome to <strong>Al Sahel Repair & Maintenance</strong>.<br><br>
                How can we help you today with your AC repair, servicing, or cooling systems? Let us know and we will get right on it!
            </p>
            <span class="chat-time text-muted position-absolute" style="font-size: 0.65rem; bottom: 5px; right: 10px;">Just now ✓✓</span>
        </div>
    </div>
    
    <!-- Premium Footer with Custom Styled Button -->
    <div class="whatsapp-popup-footer p-3 bg-white border-top d-flex justify-content-center">
        <button class="btn btn-primary whatsapp-submit-btn w-100 py-2.5 px-4 rounded-pill d-flex align-items-center justify-content-center gap-2" (click)="openWhatsAppDirect()">
            <i class="fab fa-whatsapp font-size-lg"></i>
            <span>Open Chat</span>
            <i class="fa fa-paper-plane ms-1" style="font-size: 0.8rem; opacity: 0.8;"></i>
        </button>
    </div>
</div>
}
